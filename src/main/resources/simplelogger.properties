# Keep the CLI output clean: only show warnings/errors, and silence MSAL's own WARN lines
# (mailtracker already reports per-resource token success/failure itself).
org.slf4j.simpleLogger.defaultLogLevel=warn
org.slf4j.simpleLogger.showDateTime=false
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.log.com.microsoft.aad.msal4j=error
